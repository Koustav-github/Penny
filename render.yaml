# Render Blueprint for the Penny FastAPI backend.
# Free plan: Pre-Deploy commands aren't available, so migrations run as part of
# the start command (alembic upgrade head) before uvicorn boots.
services:
  - type: web
    name: penny-backend
    runtime: python
    rootDir: backend
    plan: free
    # .python-version pins 3.12
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # set in dashboard (Neon / Render Postgres, sslmode=require)
      - key: CLERK_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EXCHANGE_RATES_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false        # e.g. https://your-frontend.vercel.app
